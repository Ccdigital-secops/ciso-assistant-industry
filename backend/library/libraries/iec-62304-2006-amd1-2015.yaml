            name: "Logiciels d'origine inconnue (SOUP)"
            description: "Le fabricant doit identifier et gérer les logiciels d'origine inconnue (SOUP), notamment les composants open source et tiers. Les vulnérabilités de sécurité des SOUP doivent être surveillées et traitées. Cette exigence est alignée avec les exigences SBOM de la FDA."
